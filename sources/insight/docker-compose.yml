version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insight_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3003:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - insight-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insight_frontend
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - backend
    networks:
      - insight-net

networks:
  insight-net:
    driver: bridge
