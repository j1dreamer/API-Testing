name: Auto Deploy INSIGHT

on:
  release:
    types: [published] # Kích hoạt khi anh tạo một Release mới

jobs:
  deploy:
    runs-on: self-hosted # Chỗ này cực kỳ quan trọng: phải là self-hosted
    steps:
      - name: Deploy Code
        run: |
          cd /home/cuong-deploy/API-Testing
          git pull origin main
          docker compose up -d --build
          docker image prune -f
