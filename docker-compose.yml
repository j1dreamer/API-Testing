version: '3.8'

services:
  backend:
    build:
      context: ./sources/insight/backend
      dockerfile: Dockerfile
    container_name: insight_backend
    restart: unless-stopped
    env_file:
      - ./sources/insight/.env
    environment:
      # Ép dùng con MongoDB "lão làng" của anh
      - MONGODB_URL=mongodb://MongoDB:27017 
      # Thêm dòng này để log sạch đẹp, không còn cảnh báo bảo mật
      - INTERNAL_APP_AUTH=CuongDeploy_Secret_2026 
    ports:
      - "3003:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Kết nối với container MongoDB đang chạy bên ngoài
    external_links:
      - MongoDB 
    networks:
      - insight-net

  frontend:
    build:
      context: ./sources/insight/frontend
      dockerfile: Dockerfile
    container_name: insight_frontend
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - backend
    networks:
      - insight-net

networks:
  insight-net:
    driver: bridge
    # Cho phép các container khác (như con MongoDB cũ) tham gia vào mạng này
    name: api-testing_insight-net